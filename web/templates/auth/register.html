{% extends 'base.html' %}

{% block title %}Регистрация | ToDO{% endblock title %}

{% block head %}
<link rel="stylesheet" href="https://cloudflare.com">
<style>
    :root {
        --panel-bg: #ffffff;
        --input-bg: #f8fafc;
        --border-color: #e2e8f0;
        --text-muted: #64748b;
        --focus-ring: 0 0 0 4px rgba(13, 110, 253, 0.15);
    }

    /* Стилизация контейнера формы */
    .auth-wrapper {
        min-height: calc(100vh - 160px); /* Вычитаем примерную высоту header и footer */
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        background-color: #f1f5f9;
    }

    .auth-card {
        width: 100%;
        max-width: 440px;
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 1rem;
        padding: 2.5rem;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    .input-group-custom {
        position: relative;
    }

    .input-group-custom i {
        position: absolute;
        left: 1rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        z-index: 10;
        transition: color 0.2s ease;
    }

    .input-group-custom .form-control {
        padding-left: 2.75rem;
        background-color: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        height: 3rem;
        transition: all 0.2s ease;
    }

    .input-group-custom .form-control:focus {
        background-color: #ffffff;
        border-color: #0d6efd;
        box-shadow: var(--focus-ring);
    }

    .input-group-custom .form-control:focus + i {
        color: #0d6efd;
    }

    .btn-register {
        height: 3rem;
        font-weight: 600;
        border-radius: 0.5rem;
    }
</style>
{% endblock head %}

{% block maincontent %}
<div class="auth-wrapper">
    <div class="auth-card">
        
        <!-- Заголовок формы -->
        <div class="text-center mb-4">
            <h1 class="h3 fw-bold text-dark mb-2">Создать аккаунт</h1>
            <p class="text-muted small">Присоединяйтесь к ToDO и управляйте задачами эффективно</p>
        </div>

        <!-- Форма регистрации -->
        <form action="{{ url_for('register_user') }}" method="POST">
            
            <!-- Поле Username -->
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold text-secondary">Имя пользователя</label>
                <div class="input-group-custom">
                    <input type="text" class="form-control" id="username" name="username" placeholder="john_doe" required autocomplete="username">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>

            <!-- Поле Email -->
            <div class="mb-3">
                <label for="email" class="form-label small fw-semibold text-secondary">Электронная почта</label>
                <div class="input-group-custom">
                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
                    <i class="fa-regular fa-envelope"></i>
                </div>
            </div>

            <!-- Поле Password -->
            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold text-secondary">Пароль</label>
                <div class="input-group-custom">
                    <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="new-password">
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-register shadow-sm mb-3">
                Зарегистрироваться
            </button>
        </form>

        <div class="text-center pt-2">
            <p class="small text-muted mb-0">
                Уже есть аккаунт? <a href="#" class="text-decoration-none fw-semibold">Войти</a>
            </p>
        </div>

    </div>
</div>
{% endblock maincontent %}
